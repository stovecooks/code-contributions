name: Deploy PR previews

on:
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - closed

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
permissions:
  contents: write
  pull-requests: write

concurrency: preview-${{ github.ref }}

jobs:
    deploy-preview:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Deploy preview
              uses: rossjrw/pr-preview-action@v1
              with:
                  source-dir: .
                  preview-branch: main
                  qr-code: true